name: CI Build and Scan

on:
  push:
    branches: [ "main", "Pre-release" ]
  pull_request:
    branches: [ "main" ]

# This block fixes the "Workflow does not contain permissions" alert
permissions:
  contents: read       # Allows the workflow to check out and read the repository code
  security-events: write # Allows code scanning tools (like CodeQL) to log security alerts

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Security Scan
        run: |
          echo "Running repository security analysis..."
          # Automated scanning tools run securely here under restricted permissions
